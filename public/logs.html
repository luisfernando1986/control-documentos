<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Historial Militar</title>

<style>

body{
    font-family: Arial;
    background:#1b1b1b;
    color:white;
    padding:20px;
}

h1{
    text-align:center;
}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:20px;
    background:white;
    color:black;
}

th{
    background:#333;
    color:white;
}

th,td{
    border:1px solid #ccc;
    padding:10px;
    text-align:center;
}

tr:nth-child(even){
    background:#f2f2f2;
}

</style>

</head>
<body>

<h1>HISTORIAL MILITAR DEL SISTEMA</h1>

<table>

<thead>
<tr>
    <th>USUARIO</th>
    <th>ACCIÓN</th>
    <th>DOCUMENTO</th>
    <th>FECHA</th>
</tr>
</thead>

<tbody id="tablaLogs"></tbody>

</table>

<script>

async function cargarLogs(){

    const res = await fetch('/logs');
    const logs = await res.json();

    const tabla = document.getElementById('tablaLogs');

    tabla.innerHTML = '';

    logs.reverse().forEach(log => {

        tabla.innerHTML += `
            <tr>
                <td>${log.usuario}</td>
                <td>${log.accion}</td>
                <td>${log.documento}</td>
                <td>${log.fecha}</td>
            </tr>
        `;
    });
}

cargarLogs();

</script>

</body>
</html>
